<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 작품 모음 · Creative Coding Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Gowun+Batang:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob--pink"></span>
    <span class="blob blob--blue"></span>
    <span class="blob blob--magenta"></span>
  </div>

  <header class="masthead">
    <p class="eyebrow">Creative Coding · p5.js</p>
    <h1>도형이 숨 쉬는 <em>네 개의 화면</em></h1>
    <p class="lede">
      멈춰 있던 화면에 시간과 손길을 더했습니다.
      왼쪽은 정적인 원본, 오른쪽은 같은 작업을 움직이게 만든 버전 —
      윗줄은 추상 도형, 아랫줄은 캐릭터입니다.
      오른쪽 캐릭터는 클릭하거나 방향키·스페이스로 움직여 보세요.
    </p>
  </header>

  <main id="projects" aria-label="작품 갤러리">
    <!-- 1행: 과제 1(정적·추상) | 과제 4(동적·추상) -->
    <figure class="cell">
      <div class="frame frame--land">
        <iframe src="sample1/index.html" title="과제 1 작품" loading="lazy"></iframe>
      </div>
      <figcaption>
        <span class="tag tag--static">STATIC</span>
        <span class="no">No.01</span>
        <span class="caption-title">고요한 좌표 — 정적 추상화</span>
      </figcaption>
    </figure>

    <figure class="cell">
      <div class="frame frame--land">
        <iframe src="sample4/index.html" title="과제 4 작품" loading="lazy"></iframe>
      </div>
      <figcaption>
        <span class="tag tag--motion">MOTION</span>
        <span class="no">No.04</span>
        <span class="caption-title">깨어난 좌표 — 추상화 애니메이션</span>
      </figcaption>
    </figure>

    <!-- 2행: 과제 2(정적·캐릭터) | 과제 3(동적·캐릭터) -->
    <figure class="cell">
      <div class="frame frame--port">
        <iframe src="sample2/index.html" title="과제 2 작품" loading="lazy"></iframe>
      </div>
      <figcaption>
        <span class="tag tag--static">STATIC</span>
        <span class="no">No.02</span>
        <span class="caption-title">잠든 친구 — 정적 캐릭터</span>
      </figcaption>
    </figure>

    <figure class="cell">
      <div class="frame frame--port">
        <iframe src="sample3/index.html" title="과제 3 작품" loading="lazy"></iframe>
      </div>
      <figcaption>
        <span class="tag tag--motion">MOTION</span>
        <span class="no">No.03</span>
        <span class="caption-title">깨어난 친구 — 인터랙티브 캐릭터</span>
      </figcaption>
    </figure>
  </main>

  <footer class="colophon">
    <span class="line"></span>
    <p>made with p5.js · 2026</p>
  </footer>
</body>
</html>
